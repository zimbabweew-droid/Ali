<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personal Course Organizer</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add_course.html">Add Course</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Add a New Course</h2>
            <form action="#" method="get">
                <label for="c_name">Course Name:</label>
                <input type="text" id="c_name" name="coursename" required>

                <label for="inst">Instructor:</label>
                <input type="text" id="inst" name="instructor" required>

                <label for="c_hours">Credit Hours:</label>
                <input type="number" id="c_hours" name="credithours" min="1" max="6" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4"></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer</p>
    </footer>

</body>
</html>
